server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unknown path resolves to index.html so React Router
    # can pick it up.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for fingerprinted Vite assets.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpe?g|svg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Always re-fetch index.html so a new deploy takes effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Minimal security headers — the backend handles CORS / Cache-Control on
    # API responses; these are for the static SPA itself.
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "no-referrer-when-downgrade";
}
