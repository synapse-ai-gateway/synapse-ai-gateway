# Disables the "Open a blank issue" option — forces issues into one of the
# templates above so reports are consistently structured.
blank_issues_enabled: false

contact_links:
  - name: Security vulnerability
    url: https://github.com/synapse-ai-gateway/synapse-ai-gateway/security/advisories/new
    about: |
      Please do NOT file a public issue for security vulnerabilities. Use
      GitHub Security Advisories (private channel) so a fix can ship before
      the vulnerability becomes public. See SECURITY.md for the full process.

  - name: Question or discussion
    url: https://github.com/synapse-ai-gateway/synapse-ai-gateway/discussions
    about: |
      For usage questions, "how do I…", or design discussion that isn't a bug
      report or feature request, use GitHub Discussions.

  - name: Documentation
    url: https://github.com/synapse-ai-gateway/synapse-ai-gateway/tree/main/docs
    about: |
      Read the docs first — governance model, DLP configuration, hybrid
      routing, and audit logging are each covered in detail.
