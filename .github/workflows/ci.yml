name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a new commit arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest with coverage
        # sysmon tracer captures async lines correctly on Python 3.12+;
        # 3.11 falls back to coverage's default C tracer.
        env:
          COVERAGE_CORE: ${{ matrix.python-version == '3.12' && 'sysmon' || '' }}
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing -rs

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security scans (Bandit + Trivy fs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install Bandit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install bandit==1.9.4

      - name: Bandit (report medium + high)
        working-directory: backend
        # -ll reports MEDIUM and HIGH findings for visibility in the CI log.
        # --exit-zero keeps this step informational; the next step is the gate.
        # Exclusions (tests, backend_ve, alembic/versions) come from .bandit.
        run: bandit -r . -c .bandit -ll --exit-zero

      - name: Bandit (fail on high severity)
        working-directory: backend
        # -lll reports HIGH only and exits non-zero on any finding, gating the build.
        run: bandit -r . -c .bandit -lll

      - name: Trivy filesystem scan (dependency vulnerabilities)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
          format: 'table'

  docker:
    name: Docker build + Trivy image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to GitHub Security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — verify it builds cleanly)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: synapse-ai-gateway:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (advisory only — never fails the build)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'synapse-ai-gateway:ci-${{ github.sha }}'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'         # advisory — findings surface in GitHub Security, not as a CI failure
          format: 'sarif'
          output: 'trivy-image.sarif'

      - name: Upload Trivy results to GitHub Security
        if: always()             # publish even if a previous step failed
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'
